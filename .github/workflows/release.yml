name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build a release for (e.g. v1.4.2). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: spacemolt-client-v2-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: spacemolt-client-v2-linux-arm64
          - os: macos-latest
            target: darwin-x64
            artifact: spacemolt-client-v2-macos-x64
          - os: macos-latest
            target: darwin-arm64
            artifact: spacemolt-client-v2-macos-arm64
          - os: windows-latest
            target: windows-x64
            artifact: spacemolt-client-v2-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Honor the dispatched tag input on workflow_dispatch; default to
          # the pushed tag for tag-push events.
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun build ./src/main.ts --compile --target=bun-${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          # On tag-push, GITHUB_REF is refs/tags/vX.Y.Z. On workflow_dispatch
          # we get the tag in inputs.tag (which may include the leading "v").
          RAW="${{ inputs.tag || github.ref_name }}"
          VERSION="${RAW#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: SpaceMolt Client v2 — v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/spacemolt-client-v2-linux-x64/spacemolt-client-v2-linux-x64
            artifacts/spacemolt-client-v2-linux-arm64/spacemolt-client-v2-linux-arm64
            artifacts/spacemolt-client-v2-macos-x64/spacemolt-client-v2-macos-x64
            artifacts/spacemolt-client-v2-macos-arm64/spacemolt-client-v2-macos-arm64
            artifacts/spacemolt-client-v2-windows-x64.exe/spacemolt-client-v2-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Get version
        id: version
        run: |
          RAW="${{ inputs.tag || github.ref_name }}"
          VERSION="${RAW#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set; skipping Discord notification."
            exit 0
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"

          # The client just tracks the gameserver API, so the useful, concise
          # message is "you're now current with gameserver vN" plus a link to the
          # release for the changelog + downloads — not a raw OpenAPI path diff.
          # The tag checkout includes openapi.json, whose info.x-gameserver-version
          # is the server build this release was generated against.
          GSLINE="Updated to match the latest SpaceMolt gameserver API."
          GS_VERSION=$(jq -r '.info["x-gameserver-version"] // empty' openapi.json 2>/dev/null || true)
          [ -n "$GS_VERSION" ] && GSLINE="Updated to match SpaceMolt gameserver v${GS_VERSION#v}."

          PAYLOAD=$(jq -n \
            --arg title "SpaceMolt Client v2 v${VERSION} Released" \
            --arg url "$RELEASE_URL" \
            --arg gsline "$GSLINE" \
            '{
              "embeds": [{
                "title": $title,
                "url": $url,
                "description": ($gsline + "\n\n[Release notes & downloads](" + $url + ")"),
                "color": 3447003,
                "footer": { "text": "SpaceMolt DevTeam" }
              }]
            }')

          HTTP_CODE=$(curl -sS -o /tmp/discord_resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Discord webhook failed: HTTP $HTTP_CODE" >&2
            cat /tmp/discord_resp.txt >&2
            exit 1
          fi
          echo "Discord notification sent."
